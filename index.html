<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World</title>
  <meta name="description" content="Hello World." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #000000;
      --card: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.08);
      --accent1: #7c6bff;
      --accent2: #e040fb;
      --text: #f0f0ff;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated gradient orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      animation: drift 10s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
    }

    .orb1 {
      width: 520px;
      height: 520px;
      background: var(--accent1);
      top: -120px;
      left: -120px;
      animation-duration: 12s;
    }

    .orb2 {
      width: 400px;
      height: 400px;
      background: var(--accent2);
      bottom: -100px;
      right: -80px;
      animation-duration: 9s;
      animation-delay: -4s;
    }

    .orb3 {
      width: 300px;
      height: 300px;
      background: #00d4ff;
      top: 50%;
      right: 15%;
      animation-duration: 14s;
      animation-delay: -7s;
      opacity: 0.18;
    }

    @keyframes drift {
      from {
        transform: translate(0, 0) scale(1);
      }

      to {
        transform: translate(40px, 30px) scale(1.08);
      }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 64px 72px;
      text-align: center;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: 0 32px 80px rgba(0, 0, 0, 0.5);
      animation: fadeUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
      transition: opacity 1s ease;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(36px) scale(0.97);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .greeting {
      font-size: clamp(2.8rem, 8vw, 5.5rem);
      font-weight: 900;
      letter-spacing: -2px;
      line-height: 1.05;
      background: linear-gradient(135deg, #fff 30%, var(--accent1) 60%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Subtle grid pattern overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* Rockets screen */
    #rockets {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      font-size: 4rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1s ease;
      z-index: 10;
    }

    #rockets.visible {
      opacity: 1;
    }

    /* Page dissolve */
    #page {
      display: contents;
      transition: opacity 1s ease;
    }

    #page.hidden {
      opacity: 0;
      pointer-events: none;
    }

    @media (max-width: 600px) {
      .card {
        padding: 40px 28px;
        border-radius: 20px;
      }
    }
  </style>
</head>

<body>

  <div id="page">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>

    <main class="card" id="main-card">
      <h1 class="greeting">Hello, World!</h1>
    </main>
  </div>

  <div id="rockets">
    🚀 🚀 🚀 🚀 🚀
  </div>

  <script>
    setTimeout(() => {
      // Dissolve the page
      const page = document.getElementById('page');
      const orbs = document.querySelectorAll('.orb');
      const card = document.getElementById('main-card');

      card.style.opacity = '0';
      orbs.forEach(o => o.style.opacity = '0');
      orbs.forEach(o => o.style.transition = 'opacity 1s ease');

      // Show rockets after dissolve
      setTimeout(() => {
        document.querySelectorAll('#page > *').forEach(el => el.style.display = 'none');
        document.getElementById('rockets').classList.add('visible');
      }, 1000);

    }, 5000);
  </script>

</body>

</html>
